<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArtForge | Premium Digital Art Gallery</title>
    <meta name="description" content="ArtForge — The world's most evocative digital art gallery. Browse, bid, and collect masterpieces from visionary artists worldwide." />
    <!-- PWA & Mobile Meta -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ArtForge" />
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&q=80&w=192" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
      :root {
        --accent: #f59e0b;
        --accent-light: #fbbf24;
        --accent-dark: #d97706;
        --gallery-black: #040404;
        --surface: #0d0d0d;
        --surface-2: #141414;
        --glass-border: rgba(255, 255, 255, 0.07);
        --text-primary: #f0f0f0;
        --text-secondary: #71717a;
      }

      * { box-sizing: border-box; }

      body {
        font-family: 'DM Sans', 'Inter', sans-serif;
        background-color: var(--gallery-black);
        color: var(--text-primary);
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior-y: none;
      }

      .font-serif { font-family: 'Playfair Display', Georgia, serif; }

      .bg-gallery {
        background:
          radial-gradient(ellipse 80% 50% at 10% -10%, rgba(245,158,11,0.10) 0%, transparent 60%),
          radial-gradient(ellipse 60% 40% at 90% 110%, rgba(99,102,241,0.06) 0%, transparent 50%),
          var(--gallery-black);
        background-attachment: fixed;
      }

      .glass {
        background: rgba(13, 13, 13, 0.80);
        backdrop-filter: blur(24px) saturate(160%);
        -webkit-backdrop-filter: blur(24px) saturate(160%);
        border: 1px solid var(--glass-border);
      }
      .glass-light {
        background: rgba(255,255,255,0.04);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.06);
      }

      .text-gold {
        background: linear-gradient(135deg, #fef3c7 0%, #f59e0b 50%, #d97706 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .artwork-card {
        transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.5s ease;
        will-change: transform;
        -webkit-tap-highlight-color: transparent;
      }
      .artwork-card:hover {
        transform: translateY(-10px) scale(1.01);
        box-shadow: 0 30px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(245,158,11,0.12);
      }
      @media (max-width: 1024px) {
        .artwork-card:hover { transform: none; box-shadow: none; }
        .artwork-card:active { transform: scale(0.98); opacity: 0.8; }
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes shimmer {
        0% { background-position: -1000px 0; }
        100% { background-position: 1000px 0; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        33% { transform: translateY(-12px) rotate(1deg); }
        66% { transform: translateY(-6px) rotate(-1deg); }
      }
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.4); }
        50% { box-shadow: 0 0 0 8px rgba(245,158,11,0); }
      }
      @keyframes orb-drift {
        0%, 100% { transform: translate(0,0) scale(1); }
        25% { transform: translate(30px,-20px) scale(1.05); }
        50% { transform: translate(-20px,30px) scale(0.95); }
        75% { transform: translate(20px,20px) scale(1.02); }
      }
      @keyframes ticker {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .animate-fadeIn { animation: fadeIn 0.6s ease both; }
      .animate-fadeInUp { animation: fadeInUp 0.7s ease both; }
      .animate-float { animation: float 7s ease-in-out infinite; }
      .animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
      .animate-orb { animation: orb-drift 18s ease-in-out infinite; }
      .animate-ticker { animation: ticker 35s linear infinite; }
      .animate-spin-slow { animation: spin-slow 20s linear infinite; }

      .delay-100 { animation-delay: 0.1s; }
      .delay-200 { animation-delay: 0.2s; }
      .delay-300 { animation-delay: 0.3s; }
      .delay-500 { animation-delay: 0.5s; }
      .delay-700 { animation-delay: 0.7s; }
      .delay-900 { animation-delay: 0.9s; }

      .skeleton {
        background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%);
        background-size: 1000px 100%;
        animation: shimmer 1.8s infinite linear;
      }

      ::-webkit-scrollbar { width: 3px; height: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(245,158,11,0.3); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(245,158,11,0.6); }
      .scrollbar-none::-webkit-scrollbar { display: none; }
      .scrollbar-none { scrollbar-width: none; }

      .sep {
        height: 1px;
        background: linear-gradient(to right, transparent, rgba(245,158,11,0.2), transparent);
      }

      .btn-shine {
        position: relative;
        overflow: hidden;
      }
      .btn-shine::after {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 60%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
        transition: left 0.6s ease;
      }
      .btn-shine:hover::after { left: 150%; }

      .live-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: rgba(239,68,68,0.12);
        border: 1px solid rgba(239,68,68,0.25);
        color: #f87171;
        font-size: 8px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        padding: 3px 8px;
        border-radius: 999px;
      }

      .hero-overlay {
        background: linear-gradient(
          to bottom,
          rgba(4,4,4,0.1) 0%,
          rgba(4,4,4,0.3) 40%,
          rgba(4,4,4,0.85) 75%,
          #040404 100%
        );
      }

      .ticker-wrap { overflow: hidden; white-space: nowrap; }
      .ticker-inner { display: inline-flex; gap: 0; }
    </style>
    <script type="importmap">
    {
      "imports": {
        "recharts": "https://esm.sh/recharts@^3.7.0",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-gallery">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>

# Server
server.port=${PORT:8080}

# ── MySQL DataSource ─────────────────────────────────────────────────────────
# Railway provides individual MySQL env vars: MYSQLHOST, MYSQLPORT, MYSQLDATABASE,
# MYSQLUSER, MYSQLPASSWORD. We construct the JDBC URL from these.
# NOTE: Railway's MYSQL_URL is in mysql:// format, NOT jdbc:mysql:// format,
# so we CANNOT use it directly — we must build the JDBC URL ourselves.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:artforge_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:Mahanth@9826}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool — prevent Railway idle disconnects
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:artforge-super-secret-key-2024-min-32-chars!!}
jwt.expiration=86400000

# CORS — exact origins + wildcard pattern for all Vercel preview deployments
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173,https://full-stack-project-2-lilac.vercel.app,https://*.vercel.app}

# Disable HTML error pages — always return JSON
server.error.whitelabel.enabled=false
spring.mvc.problemdetails.enabled=false

# Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME:dupaguntlarajamahanthprasad@gmail.com}
spring.mail.password=${MAIL_PASSWORD:odliiroprqdwpise}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.debug=false
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000

# Logging
logging.level.com.artforge=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

services:
  - type: web
    name: artforge-backend
    env: docker
    region: ohio # Change based on your target region
    plan: free # or starter
    rootDir: backend
    healthCheckPath: /api/artworks
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: artforge-db
          property: connectionString
      - key: DATABASE_USER
        value: root
      - key: DATABASE_PASSWORD
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "http://localhost:5173,https://full-stack-project-2-lilac.vercel.app,https://*.vercel.app"
      - key: MAIL_USERNAME
        value: "dupaguntlarajamahanthprasad@gmail.com"
      # IMPORTANT: Set MAIL_PASSWORD directly in the Render dashboard
      - key: MAIL_PASSWORD
        sync: false

databases:
  - name: artforge-db
    databaseName: artforge_db
    user: root
    region: ohio # Make sure this matches your web service region
    plan: free # Note: Render free databases expire after 90 days. You may want to use a managed MySQL host like Aiven or switch to PostgreSQL.
